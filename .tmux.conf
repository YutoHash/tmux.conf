# --- Gestion du préfixe ---
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# --- Style ---
# Note : bg=red est très agressif, assure-t-il que c'est ce que tu veux !
# set -g window-active-style bg=red
set -g window-active-style 'bg=#1e222a'

# --- Mode Vim & Souris ---
# Active les raccourcis Vim
setw -g mode-keys vi

# Active la souris par défaut (pour le scroll/clic standard)
set -g mouse on

bind v copy-mode

# --- Raccourcis Copier/Coller (Mode Vi + Presse-papiers Système via xclip) ---
# 'v' pour commencer la sélection (comme le mode visuel de Vim)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# 'y' copie la sélection directement dans le presse-papiers système (via xclip) et quitte le mode copie
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -sel clipboard"

# Raccourcis classiques hors mode copie (gardés de ta config)
bind C-c run "tmux save-buffer - | xclip -i -sel clipboard"
bind C-v run "tmux set-buffer \"$(xclip -o -sel clipboard)\"; tmux paste-buffer"


# Navigation entre les panels avec Alt + hjkl (Sans préfixe)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R


# --- Splits d'écran intuitifs ---
# Split vertical avec Préfixe + |
bind | split-window -h -c "#{pane_current_path}"

# Split horizontal avec Préfixe + -
bind - split-window -v -c "#{pane_current_path}"

# Désactive les anciens raccourcis par défaut (optionnel mais propre)
unbind '"'
unbind %

# Augmente l'historique de défilement (par défaut à 2000, vite saturé)
set -g history-limit 10000

# Aligne l'index des fenêtres et des panels sur 1 (au lieu de 0)
# C'est beaucoup plus naturel pour les doigts sur le pavé numérique
set -g base-index 1
setw -g pane-base-index 1

# Réindexation automatique des fenêtres quand on en ferme une
# Si tu fermes la fenêtre 2, la 3 devient la 2 (évite les trous : 1, 3, 4)
set -g renumber-windows on

# Supprime le délai d'attente après l'appui sur la touche Échap (ESC)
# Indispensable pour les utilisateurs de Vim/Neovim pour éviter la latence
set -s escape-time 0

# Augmente la durée d'affichage des messages de statut (en ms)
set -g display-time 2000

# Recharger la configuration facilement avec Préfixe + r
# (Plus besoin de taper la commande complète à chaque fois)
bind r source-file ~/.tmux.conf \; display-message "Configuration tmux rechargée !"

# Raccourci pour synchroniser les panels (Préfixe + y)
# Tout ce que tu tapes dans un panel est tapé dans TOUS les autres en même temps. 
# Idéal pour administrer plusieurs serveurs.
bind y setw synchronize-panes


# Force tmux à utiliser 256 couleurs et le True Color (RGB)
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Position de la barre (en haut ou en bas)
set -g status-position bottom

# Couleurs de la barre
set -g status-style 'bg=#1e1e2e fg=#cdd6f4' # Fond sombre, texte clair

# Contenu du côté gauche (Nom de la session)
set -g status-left '#[fg=#green,bold] #S '

# Contenu du côté droit (Heure et Date)
set -g status-right '#[fg=#89b4fa,bold] %H:%M #[fg=#6c7086]|#[fg=#a6e3a1,bold] %d-%b-%y '

# Style des onglets (Fenêtres) inactifs
setw -g window-status-style 'fg=#6c7086 bg=#1e1e2e'
setw -g window-status-format ' #I:#W '

# Style de l'onglet (Fenêtre) actif
setw -g window-status-current-style 'fg=#1e1e2e bg=#89b4fa bold'
setw -g window-status-current-format ' #I:#W '

# Préfixe + f ouvre une fenêtre fzf pour naviguer dans tmux (sessions, fenêtres, panels)
bind f display-popup -E -w 80% -h 80% "tmux list-sessions -F '#S' | fzf --reverse | xargs tmux switch-client -t"
